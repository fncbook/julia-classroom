name: Build and push Julia classroom image

on:
  push:
    branches: [main]
    paths:
      - Project.toml
      - precompile_workload.jl
      - .devcontainer/Dockerfile
      - .devcontainer/devcontainer.json
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fncbook/julia-classroom
  JULIA_VERSION: "1.11.9"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (${{ matrix.suffix }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: JULIA_VERSION=${{ env.JULIA_VERSION }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.JULIA_VERSION }}-${{ matrix.suffix }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.suffix }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.suffix }},mode=max

      - name: Smoke test — cached packages load without recompiling
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.JULIA_VERSION }}-${{ matrix.suffix }}"
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" julia -e '
            t_plots = @elapsed using Plots
            t_ode   = @elapsed using OrdinaryDiffEq
            println("using Plots:         $(round(t_plots, digits=2)) s")
            println("using OrdinaryDiffEq: $(round(t_ode,   digits=2)) s")
            # Fully cached loads on a 2-core CI runner are ~5s; anything
            # above 30s means the precompile cache is not being hit.
            t_plots < 30 || error("using Plots too slow ($(t_plots)s) — cache miss?")
            t_ode   < 30 || error("using OrdinaryDiffEq too slow ($(t_ode)s) — cache miss?")
          '

  manifest:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Create multi-arch manifest
        run: |
          for TAG in ${{ env.JULIA_VERSION }} latest; do
            docker buildx imagetools create \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.JULIA_VERSION }}-amd64 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.JULIA_VERSION }}-arm64
          done
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.JULIA_VERSION }}

      - name: Report image digest
        run: |
          REF_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.JULIA_VERSION }}"
          DIGEST=$(docker buildx imagetools inspect "$REF_BASE" | awk '/^Digest:/ {print $2; exit}')
          REF="${REF_BASE}@${DIGEST}"
          echo "::notice title=New image digest::${REF}"
          {
            echo "## New image pushed"
            echo ""
            echo "Update \`.devcontainer/devcontainer.json\` to pin this digest:"
            echo ""
            echo '```json'
            echo "\"image\": \"${REF}\","
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
